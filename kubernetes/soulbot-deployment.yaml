apiVersion: apps/v1
kind: Deployment
metadata:
  name: soulbot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: soulbot
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: soulbot
    spec:
      terminationGracePeriodSeconds: 35
      containers:
      - name: soulbot
        image: unprofessional/soulbot:rc-0.0.1
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        # - containerPort: 443 # HTTPS
        # only uncomment above if using soulbot-ingress.yaml service as a
        # Kubernetes ingress controller
        env:
        - name: HEALTH_PORT
          value: "8080"
        - name: DRAIN_DELAY_MS
          value: "10000"
        - name: SHUTDOWN_TIMEOUT_MS
          value: "25000"
        - name: REGISTER_GLOBAL_COMMANDS
          value: "true"
        - name: LEADER_LOCK_ID
          value: "424242"
        - name: LEADER_LOCK_RETRY_MS
          value: "2000"
        - name: DISCORD_BOT_TOKEN
          valueFrom:
            secretKeyRef:
              name: discord-bot-secret
              key: DISCORD_BOT_TOKEN
        - name: DISCORD_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: discord-client-id
              key: CLIENT_ID
        - name: DISCORD_GUILD_ID
          valueFrom:
            secretKeyRef:
              name: discord-dev-guild-id
              key: DEV_GUILD_ID
        # Postgres
        - name: PG_HOST
          valueFrom:
            secretKeyRef:
              name: pg-host
              key: PG_HOST
        - name: PG_PORT
          valueFrom:
            secretKeyRef:
              name: pg-port
              key: PG_PORT
        - name: PG_USER
          valueFrom:
            secretKeyRef:
              name: pg-user
              key: PG_USER
        - name: PG_PASS
          valueFrom:
            secretKeyRef:
              name: pg-pass
              key: PG_PASS
        - name: PG_DB
          valueFrom:
            secretKeyRef:
              name: pg-db
              key: PG_DB
        - name: OLLAMA_TRANSLATION_MODEL
          value: "translategemma:12b"
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8080
          periodSeconds: 3
          timeoutSeconds: 1
          failureThreshold: 1
        livenessProbe:
          httpGet:
            path: /livez
            port: 8080
          periodSeconds: 10
          timeoutSeconds: 1
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /readyz
            port: 8080
          periodSeconds: 5
          timeoutSeconds: 1
          failureThreshold: 12
        lifecycle:
          preStop:
            httpGet:
              path: /drain
              port: 8080
        # TODO: Kokoro Config
        volumeMounts:
        - name: temp-data-volume
          mountPath: /tempdata
      volumes:
      - name: temp-data-volume
        emptyDir:
          medium: Memory

